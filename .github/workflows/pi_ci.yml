name: Pi Gateway CI

on:
  push:
    branches: [main]
    paths:
      - 'pi/**'
      - 'shared/**'
      - '.github/workflows/pi_ci.yml'
  pull_request:
    paths:
      - 'pi/**'
      - 'shared/**'
      - '.github/workflows/pi_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pi/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        working-directory: pi
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: pi
        run: python -m ruff check . || true

      - name: Run tests
        working-directory: pi
        run: pytest --tb=short -v

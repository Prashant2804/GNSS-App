openapi: 3.0.3
info:
  title: GNSS Flow API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /ntrip/config:
    get:
      summary: Get NTRIP configuration
      responses:
        "200":
          description: OK
    post:
      summary: Store NTRIP configuration
      responses:
        "200":
          description: OK
  /ntrip/connect:
    post:
      summary: Connect to NTRIP caster using stored configuration
      responses:
        "200":
          description: OK
  /ntrip/disconnect:
    post:
      summary: Disconnect from NTRIP caster
      responses:
        "200":
          description: OK
  /imu/enabled:
    get:
      summary: Get IMU enabled flag
      responses:
        "200":
          description: OK
    post:
      summary: Set IMU enabled flag
      responses:
        "200":
          description: OK
  /device/info:
    get:
      summary: Device info
      responses:
        "200":
          description: OK
  /device/config:
    post:
      summary: Store device config
      responses:
        "200":
          description: OK
  /logs/start:
    post:
      summary: Start logging session
      responses:
        "200":
          description: OK
  /logs/stop:
    post:
      summary: Stop logging session
      responses:
        "200":
          description: OK
  /projects:
    get:
      summary: List projects
      responses:
        "200":
          description: OK
    post:
      summary: Create project
      responses:
        "200":
          description: OK
  /projects/{project_id}:
    get:
      summary: Get project
      responses:
        "200":
          description: OK
        "404":
          description: Not found
    put:
      summary: Update project
      responses:
        "200":
          description: OK
        "404":
          description: Not found
    delete:
      summary: Delete project
      responses:
        "200":
          description: OK
        "404":
          description: Not found
  /observations/start:
    post:
      summary: Start recording raw GNSS observation epochs
      responses:
        "200":
          description: OK
  /observations/stop:
    post:
      summary: Stop recording raw observation epochs
      responses:
        "200":
          description: OK
  /observations/status:
    get:
      summary: Get recording status and epoch count
      responses:
        "200":
          description: OK
  /observations/rinex:
    get:
      summary: Download recorded observations as RINEX 3.04 file
      parameters:
        - name: marker
          in: query
          schema:
            type: string
            default: GNSSFLOW
      responses:
        "200":
          description: RINEX file content
        "404":
          description: No epochs recorded
  /observations:
    delete:
      summary: Clear all recorded observation epochs
      responses:
        "200":
          description: OK
  /ws/telemetry:
    get:
      summary: Telemetry WebSocket upgrade
      responses:
        "101":
          description: Switching Protocols
